stages:
  prepare:
    cmd: cd src && python prepare.py
    deps:
      - data/raw/pose
      - src/prepare.py
      - src/config.py
    params:
      - prepare
    outs:
      - data/split:
          cache: false    # регенерується швидко, не потребує cache/remote

  train:
    cmd: cd src && python train.py
    deps:
      - data/split
      - src/train.py
      - src/config.py
    params:
      - train

  optimize:
    cmd: python src/optimize.py
    deps:
      - data/split
      - src/optimize.py
      - src/config.py
      - config/config.yaml
    params:
      - hpo
    outs:
      - models/best_model_hpo.pt:
          cache: false    # зберігається в MLflow/DagsHub, не в DVC remote
          persist: true   # не видаляти при dvc repro якщо вже існує

