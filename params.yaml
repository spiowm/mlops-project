prepare:
  dataset: pose           # яких датасет готувати (pose | detection | seg)
  val_hives:
    - "20230711b"
    - "20230609e"

train:
  model: yolo11n-pose.pt
  epochs: 1
  batch: 16
  imgsz: 320
  lr0: 0.01
  patience: 20
  optimizer: auto

evaluate:
  weights: models/best.pt   # шлях до ваг (відносно кореня проєкту)
  kp_conf: 0.5
  iou_thresh: 0.5
  output_dir: evaluation    # результати: evaluation/<dataset>/
