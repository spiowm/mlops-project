seed: 42

mlflow:
  experiment_name: "HPO_YOLO_Pose"

data:
  dataset_yaml: "data/split/dataset.yaml"

model:
  weights: "models/pretrained/yolo11n-pose.pt"
  imgsz: 320
  patience: 5

hpo:
  n_trials: 20
  sampler: "tpe"          # tpe | random
  direction: "maximize"
  metric: "metrics/mAP50-95(P)"
  trial_epochs: 5           # коротке тренування per trial
  log_trial_weights: true   # зберігати ваги кожного trial у DagsHub
  log_artifacts: true       # зберігати всі артефакти (графіки, матриці, results.csv)

  # Search space
  lr0:
    low: 0.001
    high: 0.1
  lrf:
    low: 0.001
    high: 0.1
  batch:
    choices: [4, 8, 16]
  optimizer:
    choices: ["SGD", "Adam", "AdamW"]
  mosaic:
    low: 0.0
    high: 1.0
  degrees:
    low: 0.0
    high: 30.0
  imgsz:
    choices: [320, 480, 640, 960]  # T4-safe; 960 max для Colab (15 GB VRAM)

hydra:
  run:
    dir: .
  output_subdir: null
